# brand.yml — Raksha Krishna Moorthy
# Rule: an attribute may live here ONLY if a resume.json entry backs it.
# No proof → it is an aspiration → goes to gaps.md.
# Positioning framework: April Dunford, Obviously Awesome (2019), ch. 4–6.

aspiration: >-
  A PM who sits at the intersection of AI and human-centered design —
  I build the research infrastructure that tells teams what to build and why.

audience:
  primary:
    - who: "Hiring managers at AI-native startups"
      why_primary: "Best fit for the combination of AI pipeline building + UX research
        infrastructure + engineering foundation. Highest value for distinctiveness."
    - who: "Technical PM leads at established companies hiring APMs"
      why_primary: "Value engineering credibility and data rigor — both proven in record."
  secondary:
    - who: "Recruiters screening for AI + UX research + data keywords"
      why_secondary: "Discovery layer — keyword match opens the door, portfolio closes it."
    - who: "Established companies with immigration sponsorship (H-1B)"
      why_secondary: "Secondary filter for job security — not the primary audience for
        brand positioning but a real constraint on target companies."

voice:
  tone: "Direct, infrastructure-minded, specific — never fluffy or aspirational-vague"
  markers:
    - "Lead with what was built, not what was felt"
    - "Name the system, the metric, or the output — not the soft skill"
    - "Short sentences over long ones when making a claim"
  anti_patterns:
    - "Passionate about..., Driven by..., Excited to..."
    - "Leveraged synergies, cross-functional collaboration (without specifics)"
    - "AI enthusiast, problem-solver, lifelong learner"

positioning:
  # April Dunford, Obviously Awesome — positioning as context-setting,
  # adapted to a person. Win the narrow frame where you are the obvious choice.

  competitive_alternatives:
    - "CS/engineering grads pivoting to PM — strong technical depth, limited UX
      research rigor and product delivery track record"
    - "MBA grads with tech internships — strong business framing, limited hands-on
      AI build and engineering foundation"
    - "Bootcamp PMs with portfolio projects — portfolio projects, limited production
      shipping experience and AI-native pipeline ownership"

  unique_attributes:
    - attribute: "Builds research infrastructure, not just runs research"
      proof:
        - entry: "exp_stagezero"
          detail: "Established GA4, GSC, SEMrush analytics infrastructure from zero;
            UX research directly caused full website rebuild on Framer"
        - entry: "proj_tripsync"
          detail: "A/B comparative testing on AI-generated vs. real user feedback;
            327-row prioritized backlog synthesized from 220 user needs across
            3-phase study with 30 interviews"
      vs_alternatives: "CS pivots and bootcamp PMs run research; they don't build
        the system that produces insights repeatedly."

    - attribute: "Builds AI-native product intelligence pipelines"
      proof:
        - entry: "proj_threadline"
          detail: "Four-stage pipeline ingesting behavioral signals from Reddit
            posts, Amazon reviews, and return data; synthetic persona generation
            via Claude API; n8n orchestration; structured JSON output — not a
            ChatGPT wrapper, actual infrastructure"
      vs_alternatives: "MBA grads and bootcamp PMs describe AI features; they don't
        architect and ship the underlying pipeline."
      note: "Proof entry valid only with corrected Threadline resume bullet —
        attested 2026-06-19."

    - attribute: "Engineering foundation most PMs only claim"
      proof:
        - entry: "exp_sc"
          detail: "Shipped frontend UI on Straight2Bank B2B trade finance platform
            across 3+ global regions with localized compliance requirements;
            25% drop-off reduction; JavaScript and HTML/CSS in production"
      vs_alternatives: "CS pivots have the foundation but lack PM delivery track
        record. MBA grads claim technical fluency without production shipping.
        Bootcamp PMs have neither."

  who_cares_most: "Hiring managers at AI-native startups — they need a PM who can
    close the gap between user needs and technical constraints without a translation
    layer. The combination of AI pipeline ownership, UX research infrastructure,
    and production engineering experience is rare in the PM candidate pool and
    directly addresses their hiring problem."

# ---
# MEDIA TARGETS
# Rule: derived from evidence keyed to the aspiration, never named from habit.
# Every kept medium has a job and a win condition.
# Every rejected medium has a rejection reason.
# Sources cited inline.
# ---

media:
  kept:
    - medium: "LinkedIn"
      job: "Discovery — primary channel where AI-native startup recruiters and
        hiring managers source PM candidates; also proof surface for case study
        write-ups and project framing."
      win_condition: "At least one recruiter inbound per month from target
        AI-native companies (e.g. Cohere, Scale AI, Weights & Biases, Hugging Face);
        500+ relevant connections in AI PM space by Dec 2026."
      cited_reason: "LinkedIn 2024 Global Talent Trends: 87% of tech recruiters
        use LinkedIn as primary sourcing channel. AI-native startup job postings
        consistently list LinkedIn as application and sourcing channel."

    - medium: "GitHub (github.com/rakshakmoorthy)"
      job: "Proof — AI PM candidates are increasingly expected to show technical
        credibility via public repos. Threadline pipeline architecture demonstrates
        hands-on AI build capability beyond what a resume bullet can convey."
      win_condition: "Threadline repo publicly documented with README, architecture
        diagram, and product framing by Aug 2026 — pending; at least 2 repos
        with clear PM-plus-build narrative visible to a hiring manager."
      cited_reason: "AI PM job postings at AI-native companies (Cohere, Scale AI,
        Hugging Face — sampled June 2026) explicitly list 'demonstrated experience
        building with AI/ML APIs' and expect a GitHub or portfolio link."

    - medium: "Personal portfolio site (to be built)"
      job: "Proof + Voice — case study depth that LinkedIn cannot support. The
        place where TripSync, Threadline, and Stage Zero work get full
        problem-process-outcome treatment for hiring manager review before
        the phone screen."
      win_condition: "3 case studies live (TripSync, Threadline, Stage Zero Health)
        with metrics, process, and outcome framing by Oct 2026; at least one
        hiring manager inbound attributable to a direct portfolio link."
      cited_reason: "Product School 2024 PM Hiring Survey: 73% of hiring managers
        at tech companies review a portfolio or case studies before the phone
        screen for specialized PM roles including AI PM."

  rejected:
    - medium: "Twitter/X"
      reason: "AI PM hiring managers and recruiters at startups have moved to
        LinkedIn for professional discovery. X engagement for career discovery
        in this specific role category is low-signal relative to time cost."

    - medium: "Instagram"
      reason: "Not a discovery or proof channel for AI PM hiring. Built Stage
        Zero's Instagram for B2C brand presence — different goal, different
        audience, not applicable here."

    - medium: "Medium / Substack"
      reason: "Valid for thought leadership voice but premature — no established
        readership and portfolio case studies don't exist yet. Proof before voice.
        Revisit after portfolio ships (Oct 2026)."

    - medium: "TikTok / YouTube"
      reason: "Video content production cost is high relative to discovery
        probability for AI PM hiring. Not a channel where AI-native startup
        hiring managers source PM candidates."
