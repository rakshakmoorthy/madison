<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The inclusion test</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;
    --color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;}
  @media (prefers-color-scheme: dark){
    :root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;
      --color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--color-white);color:var(--color-ink);
    font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;}
  #chart{width:100%;}
  .node{font-family:'Inter',sans-serif;font-size:11px;fill:var(--color-ink);}
  .edge{font-family:'JetBrains Mono',monospace;font-size:10px;fill:var(--color-secondary);}
  .cap{font-family:'EB Garamond',Georgia,serif;font-size:13px;font-style:italic;fill:var(--color-secondary);}
  .tooltip{position:absolute;pointer-events:none;opacity:0;background:var(--color-white);
    border:1px solid var(--color-border);padding:6px 10px;font-size:13px;color:var(--color-ink);}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA={
  test:"Can the evidence be described in one sentence?",
  yes:"Include with label",
  no:"Exclude → route to assumptions list"
};
const tooltip=d3.select('body').append('div').attr('class','tooltip');
function showTip(e,h){tooltip.html(h).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px')
  .transition().duration(150).style('opacity',1);}
function moveTip(e){tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px');}
function hideTip(){tooltip.transition().duration(100).style('opacity',0);}
function draw(d){
  d3.select('#chart').selectAll('*').remove();
  const W=document.getElementById('chart').clientWidth||700, H=340;
  const svg=d3.select('#chart').append('svg').attr('width',W).attr('height',H)
    .attr('viewBox',`0 0 ${W} ${H}`).attr('role','img').attr('aria-labelledby','c-title c-desc');
  svg.append('title').attr('id','c-title').text('The inclusion test');
  svg.append('desc').attr('id','c-desc').text('A single test decides whether a candidate persona detail is included with a label or excluded into the assumptions list.');
  svg.append('defs').append('marker').attr('id','ar').attr('markerWidth',9).attr('markerHeight',9).attr('refX',7).attr('refY',4).attr('orient','auto')
    .append('path').attr('d','M0,0 L8,4 L0,8 z').attr('fill','var(--color-ink)');
  const cx=W/2;
  // entry
  svg.append('rect').attr('x',cx-90).attr('y',24).attr('width',180).attr('height',40).attr('fill','#F5F5F5').attr('stroke','var(--color-ink)')
    .attr('tabindex',0).attr('aria-label','Candidate persona detail')
    .on('mouseover',(e)=>showTip(e,'Candidate persona detail')).on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','node').attr('x',cx).attr('y',48).attr('text-anchor','middle').text('Candidate persona detail');
  svg.append('line').attr('x1',cx).attr('y1',64).attr('x2',cx).attr('y2',92).attr('stroke','var(--color-ink)').attr('stroke-width',1.5).attr('marker-end','url(#ar)').attr('aria-hidden','true');
  // diamond
  svg.append('polygon').attr('points',`${cx},92 ${cx+130},150 ${cx},208 ${cx-130},150`).attr('fill','var(--color-white)').attr('stroke','var(--color-secondary)')
    .attr('tabindex',0).attr('aria-label',d.test)
    .on('mouseover',(e)=>showTip(e,d.test)).on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','node').attr('x',cx).attr('y',146).attr('text-anchor','middle').text('Evidence describable');
  svg.append('text').attr('class','node').attr('x',cx).attr('y',162).attr('text-anchor','middle').text('in one sentence?');
  // yes -> include (left)
  svg.append('text').attr('class','edge').attr('x',cx-150).attr('y',230).text('yes');
  svg.append('line').attr('x1',cx-130).attr('y1',150).attr('x2',cx-180).attr('y2',236).attr('stroke','var(--color-ink)').attr('stroke-width',1.5).attr('marker-end','url(#ar)').attr('aria-hidden','true');
  svg.append('rect').attr('x',cx-290).attr('y',240).attr('width',170).attr('height',44).attr('fill','var(--color-white)').attr('stroke','var(--color-red)').attr('stroke-width',2)
    .attr('tabindex',0).attr('aria-label',d.yes)
    .on('mouseover',(e)=>showTip(e,d.yes)).on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','node').attr('x',cx-280).attr('y',266).text(d.yes);
  // no -> exclude (right)
  svg.append('text').attr('class','edge').attr('x',cx+140).attr('y',230).text('no');
  svg.append('line').attr('x1',cx+130).attr('y1',150).attr('x2',cx+180).attr('y2',236).attr('stroke','var(--color-ink)').attr('stroke-width',1.5).attr('marker-end','url(#ar)').attr('aria-hidden','true');
  svg.append('rect').attr('x',cx+120).attr('y',240).attr('width',180).attr('height',44).attr('fill','var(--color-white)').attr('stroke','var(--color-ochre)').attr('stroke-width',2)
    .attr('tabindex',0).attr('aria-label',d.no)
    .on('mouseover',(e)=>showTip(e,d.no)).on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','node').attr('x',cx+130).attr('y',266).text('Exclude → assumptions list');
  svg.append('text').attr('class','cap').attr('x',20).attr('y',H-8)
    .text('Exclusion is deferral, not deletion. Evidence-supported inference is in; invention is out.');
}
async function load(){try{return await d3.json('./10-audience-persona-evidence-synthesis-fig-03/data.json');}catch{return FALLBACK_DATA;}}
load().then(d=>{draw(d);const ro=new ResizeObserver(()=>draw(d));ro.observe(document.getElementById('chart'));});
</script>
</body>
</html>
