<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim type taxonomy</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;
    --color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;}
  @media (prefers-color-scheme: dark){
    :root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;
      --color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--color-white);color:var(--color-ink);
    font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;}
  #chart{width:100%;}
  .node{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;fill:var(--color-ink);}
  .req{font-family:'JetBrains Mono',monospace;font-size:10px;fill:var(--color-secondary);}
  .axis{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;fill:var(--color-secondary);}
  .cap{font-family:'EB Garamond',Georgia,serif;font-size:13px;font-style:italic;fill:var(--color-secondary);}
  .tooltip{position:absolute;pointer-events:none;opacity:0;background:var(--color-white);
    border:1px solid var(--color-border);padding:6px 10px;font-size:13px;color:var(--color-ink);}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA=[
  {type:"Performance",burden:"high"},{type:"Comparative",burden:"high"},
  {type:"Credential",burden:"med-high"},{type:"Audience",burden:"medium"},
  {type:"Factual",burden:"low-med"},{type:"Opinion",burden:"low (attribution)"},
  {type:"Puffery",burden:"none",outlier:true}
];
const tooltip=d3.select('body').append('div').attr('class','tooltip');
function showTip(e,h){tooltip.html(h).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px')
  .transition().duration(150).style('opacity',1);}
function moveTip(e){tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px');}
function hideTip(){tooltip.transition().duration(100).style('opacity',0);}
function draw(data){
  d3.select('#chart').selectAll('*').remove();
  const W=document.getElementById('chart').clientWidth||700;
  const rowH=44, m=20, top=44, H=top+data.length*rowH+44;
  const svg=d3.select('#chart').append('svg').attr('width',W).attr('height',H)
    .attr('role','img').attr('aria-labelledby','c-title c-desc');
  svg.append('title').attr('id','c-title').text('Claim type taxonomy');
  svg.append('desc').attr('id','c-desc').text('Seven claim categories ordered by proof burden, from performance and comparative at the high end to puffery at the no-proof end.');
  svg.append('text').attr('class','axis').attr('x',m).attr('y',28).text('Proof burden: high');
  svg.append('text').attr('class','axis').attr('x',W-m).attr('y',H-16).attr('text-anchor','end').text('→ none');
  data.forEach((d,i)=>{
    const y=top+i*rowH;
    svg.append('rect').attr('x',m).attr('y',y).attr('width',W-2*m).attr('height',rowH-10)
      .attr('fill','var(--color-white)').attr('stroke',d.outlier?'var(--color-ochre)':'var(--color-secondary)')
      .attr('stroke-width',d.outlier?2:1).attr('tabindex',0).attr('aria-label',d.type+': proof burden '+d.burden)
      .on('mouseover',(e)=>showTip(e,'<strong>'+d.type+'</strong><br>proof burden: '+d.burden)).on('mousemove',moveTip).on('mouseout',hideTip);
    svg.append('text').attr('class','node').attr('x',m+14).attr('y',y+22).text(d.type);
    svg.append('text').attr('class','req').attr('x',W-m-14).attr('y',y+22).attr('text-anchor','end').text(d.burden);
  });
  svg.append('text').attr('class','cap').attr('x',m).attr('y',H-2)
    .text('Equal nodes: the taxonomy sorts by proof obligation, not by quality. Puffery is the outlier.');
}
async function load(){try{return await d3.json('./09-claims-and-proof-map-fig-01/data.json');}catch{return FALLBACK_DATA;}}
load().then(d=>{draw(d);const ro=new ResizeObserver(()=>draw(d));ro.observe(document.getElementById('chart'));});
</script>
</body>
</html>
