<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observation layer vs. implication layer</title>
<style>
  :root{--color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;
    --color-secondary:#545454;--color-border:#D4D4D4;--color-ochre:#C8860E;}
  @media (prefers-color-scheme: dark){
    :root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;
      --color-secondary:#A0978C;--color-border:#2E2E2E;--color-ochre:#D49A30;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--color-white);color:var(--color-ink);
    font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;}
  #chart{width:100%;}
  .lab{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;fill:var(--color-ink);}
  .note{font-family:'Inter',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .cap{font-family:'EB Garamond',Georgia,serif;font-size:14px;font-style:italic;fill:var(--color-secondary);}
  .tooltip{position:absolute;pointer-events:none;opacity:0;background:var(--color-white);
    border:1px solid var(--color-border);padding:6px 10px;font-size:13px;color:var(--color-ink);}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="chart" role="main"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA={lower:"Observation layer — sourced, dated, observed signals",upper:"Implication layer — labeled interpretations, candidates not findings"};
const tooltip=d3.select('body').append('div').attr('class','tooltip');
function showTip(e,h){tooltip.html(h).style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px')
  .transition().duration(150).style('opacity',1);}
function moveTip(e){tooltip.style('left',(e.pageX+12)+'px').style('top',(e.pageY-28)+'px');}
function hideTip(){tooltip.transition().duration(100).style('opacity',0);}

function draw(d){
  d3.select('#chart').selectAll('*').remove();
  const totalWidth=document.getElementById('chart').clientWidth||700;
  const totalHeight=360;
  const svg=d3.select('#chart').append('svg').attr('width',totalWidth).attr('height',totalHeight)
    .attr('role','img').attr('aria-labelledby','c-title c-desc');
  svg.append('title').attr('id','c-title').text('Observation layer vs. implication layer');
  svg.append('desc').attr('id','c-desc').text('Two stacked bands separated by a gate line, with a single upward arrow representing human judgment converting observations into interpretations.');
  svg.append('defs').append('marker').attr('id','up').attr('markerWidth',9).attr('markerHeight',9)
    .attr('refX',4).attr('refY',2).attr('orient','auto')
    .append('path').attr('d','M0,8 L4,0 L8,8 z').attr('fill','var(--color-red)');
  const m=20, w=totalWidth-2*m, bandH=90, gateY=m+bandH+30;
  // upper band (implication)
  svg.append('rect').attr('x',m).attr('y',m).attr('width',w).attr('height',bandH)
    .attr('fill','var(--color-white)').attr('stroke','var(--color-ink)')
    .attr('tabindex',0).attr('aria-label','Implication layer')
    .on('mouseover',(e)=>showTip(e,'<strong>'+d.upper+'</strong>')).on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','lab').attr('x',m+14).attr('y',m+28).text('Implication layer');
  svg.append('text').attr('class','note').attr('x',m+14).attr('y',m+50).text('Labeled interpretations — candidates, not findings');
  // gate line
  svg.append('line').attr('x1',m).attr('y1',gateY).attr('x2',m+w).attr('y2',gateY)
    .attr('stroke','var(--color-ochre)').attr('stroke-width',3).attr('aria-hidden','true');
  svg.append('text').attr('class','note').attr('x',m+w-220).attr('y',gateY-8).text('one observation → many interpretations');
  // upward arrow = human judgment
  svg.append('line').attr('x1',m+60).attr('y1',gateY+24).attr('x2',m+60).attr('y2',gateY-24)
    .attr('stroke','var(--color-red)').attr('stroke-width',2).attr('marker-end','url(#up)').attr('aria-hidden','true');
  svg.append('text').attr('class','note').attr('x',m+78).attr('y',gateY+4).text('human judgment');
  // lower band (observation)
  svg.append('rect').attr('x',m).attr('y',gateY+24).attr('width',w).attr('height',bandH)
    .attr('fill','var(--color-white)').attr('stroke','var(--color-secondary)')
    .attr('tabindex',0).attr('aria-label','Observation layer')
    .on('mouseover',(e)=>showTip(e,'<strong>'+d.lower+'</strong>')).on('mousemove',moveTip).on('mouseout',hideTip);
  svg.append('text').attr('class','lab').attr('x',m+14).attr('y',gateY+24+28).text('Observation layer');
  svg.append('text').attr('class','note').attr('x',m+14).attr('y',gateY+24+50).text('Sourced, dated, directly observed signals');
  svg.append('text').attr('class','cap').attr('x',m).attr('y',totalHeight-12)
    .text('The crossing is a human decision, not an automatic inference.');
}
async function load(){try{return await d3.json('./06-competitor-signal-scan-fig-03/data.json');}catch{return FALLBACK_DATA;}}
load().then(d=>{draw(d);const ro=new ResizeObserver(()=>draw(d));ro.observe(document.getElementById('chart'));});
</script>
</body>
</html>
