<marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#545454"/></marker></defs>

<text x="350" y="40" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The Four Gate Decision Types</text>

<!-- Panel 1: proceed (active) -->
<rect x="40" y="70" width="290" height="140" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
<text x="56" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Proceed</text>
<rect x="60" y="120" width="60" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<line x1="120" y1="140" x2="250" y2="140" stroke="#545454" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
<rect x="252" y="120" width="60" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<text x="186" y="190" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Clean forward into next phase.</text>

<!-- Panel 2: conditional proceed (primary) -->
<rect x="370" y="70" width="290" height="140" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
<text x="386" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Conditional proceed</text>
<rect x="390" y="120" width="60" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<line x1="450" y1="140" x2="580" y2="140" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="500" y="106" width="22" height="22" fill="#C8102E"/>
<text x="511" y="102" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#545454">open</text>
<rect x="582" y="120" width="60" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<text x="516" y="190" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Forward, carrying named open items.</text>

<!-- Panel 3: hold (blocking) -->
<rect x="40" y="226" width="290" height="160" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
<text x="56" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E">Hold</text>
<rect x="60" y="280" width="60" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<line x1="120" y1="300" x2="210" y2="300" stroke="#2a1a0e" stroke-width="1.5"/>
<rect x="214" y="266" width="10" height="68" fill="#C8102E"/>
<rect x="240" y="282" width="70" height="36" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
<text x="275" y="304" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#C8102E">blocker</text>
<text x="186" y="366" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Stopped until a named blocker is resolved.</text>

<!-- Panel 4: close with findings (transitional) -->
<rect x="370" y="226" width="290" height="160" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
<text x="386" y="248" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Close with findings</text>
<rect x="400" y="280" width="60" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1"/>
<line x1="430" y1="320" x2="430" y2="346" stroke="#545454" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<rect x="500" y="282" width="14" height="14" fill="#545454"/>
<rect x="385" y="350" width="120" height="28" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
<text x="445" y="368" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#2a1a0e">future work</text>
<text x="565" y="300" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Terminal; open</text>
<text x="565" y="316" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">questions deferred.</text>

<text x="350" y="406" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">None of these is a failure — a hold is the system working correctly.</text>
