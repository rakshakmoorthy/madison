<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
<title id="fig-title-02">The Four Gate Decision Types</title>
<desc>Four panels for the gate decision types: proceed is a clean forward arrow; conditional proceed carries a small open-items marker forward; hold stops at a barrier naming the blocker; close with findings is a terminal node with a side branch depositing open questions into future work. None of these is a failure.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="16-the-build-and-the-honest-run" figure-number="02" figure-title="The Four Gate Decision Types" figure-slug="the-four-gate-decision-types" figure-type="comparison panels" priority="Critical" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/16-the-build-and-the-honest-run-cajal.md"/></metadata>
