  <title id="fig-title-01">Evidence Rows to Warranted Claims</title>
  <desc>Raw audience observations from interviews, surveys, support tickets, CRM, sales, and social comments are labeled with source and confidence, then pass through four operations — clustering, confidence labeling, contradiction handling, and exclusion. Exclusion diverts unsourced details down into an excluded-assumptions parking lane. The main flow ends in warranted claims feeding an audience brief.</desc>
