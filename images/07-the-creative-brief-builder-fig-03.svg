<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Brief, Register, and the Gate Before Asset Work</title>
  <desc>A brief whose fields carry statuses feeds an assumption register listing every Inferred and Unknown field with an owner, then a gate, then asset generation. Two paths may cross the gate: gaps resolved, or risk explicitly accepted by a named person. A third forbidden path — proceeding by default with invisible gaps — is blocked.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="07-the-creative-brief-builder" figure-number="03" figure-title="Brief, Register, and the Gate Before Asset Work" figure-slug="brief-register-gate" figure-type="process flowchart" priority="Important" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/07-the-creative-brief-builder-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Brief, Register, and the Gate Before Asset Work</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Proceeding with gaps is fine — only when someone chooses it explicitly, never by default.</text>

  <!-- Brief -->
  <rect x="40" y="160" width="120" height="60" fill="#FFFFFF" stroke="#787878" stroke-width="1"/>
  <text x="100" y="186" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">Brief</text>
  <text x="100" y="202" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">status-labeled fields</text>

  <line x1="160" y1="190" x2="198" y2="190" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Assumption Register -->
  <rect x="204" y="160" width="130" height="60" fill="#FFFFFF" stroke="#787878" stroke-width="1"/>
  <text x="269" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">Assumption</text>
  <text x="269" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">Register</text>
  <text x="269" y="214" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">open fields + owners</text>

  <line x1="334" y1="190" x2="372" y2="190" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GATE -->
  <rect x="378" y="156" width="110" height="68" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="433" y="186" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" text-anchor="middle">GATE</text>
  <text x="433" y="204" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" text-anchor="middle">no gap = approved</text>

  <!-- Asset Generation -->
  <rect x="560" y="160" width="120" height="60" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="620" y="186" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">Asset</text>
  <text x="620" y="202" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">Generation</text>

  <!-- two permitted paths from gate -->
  <!-- path 1: gaps resolved (upper) -->
  <path d="M488 176 C 520 150, 540 150, 560 176" fill="none" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="498" y="142" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">gaps resolved</text>
  <!-- path 2: risk accepted (lower) -->
  <path d="M488 204 C 520 230, 540 230, 560 204" fill="none" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="494" y="252" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">risk accepted (named person)</text>

  <!-- forbidden default-drift path (blocked) -->
  <line x1="269" y1="300" x2="540" y2="300" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- blocking marker at gate -->
  <line x1="436" y1="288" x2="436" y2="312" stroke="#C8102E" stroke-width="3"/>
  <text x="60" y="304" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Forbidden: default drift</text>
  <text x="60" y="320" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#787878">moving forward with invisible gaps</text>

  <!-- gate condition annotation -->
  <line x1="40" y1="356" x2="668" y2="356" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="40" y="376" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Gate condition: no downstream asset work treats an Inferred or Unknown field as approved strategy.</text>
</svg>
