<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The Five Work Types Flow</title>
  <desc>Five stages of brand work in sequence — Execution, Evidence, Judgment, Approval, Learning — joined by forward arrows, with a curved feedback arrow from Learning back to Execution. Execution and Evidence are marked AI-assistable; Judgment, Approval, and Learning are human acts. The flow is linear within a campaign and cyclical across campaigns.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="02-the-reallocation-principle" figure-number="01" figure-title="The Five Work Types Flow" figure-slug="the-five-work-types-flow" figure-type="cycle diagram" priority="Critical" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/02-the-reallocation-principle-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#C8102E"/></marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="44" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The five work types: linear per campaign, cyclical across them</text>

  <!-- Nodes -->
  <!-- AI-assistable nodes: lighter ink fill outline; human-only: dominant -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12">
    <!-- Execution -->
    <rect x="32" y="150" width="116" height="60" fill="#FFFFFF" stroke="#787878" stroke-width="1.5"/>
    <text x="90" y="186" text-anchor="middle" fill="#2a1a0e">Execution</text>
    <!-- Evidence -->
    <rect x="162" y="150" width="116" height="60" fill="#FFFFFF" stroke="#787878" stroke-width="1.5"/>
    <text x="220" y="186" text-anchor="middle" fill="#2a1a0e">Evidence</text>
    <!-- Judgment -->
    <rect x="292" y="150" width="116" height="60" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <text x="350" y="186" text-anchor="middle" fill="#2a1a0e">Judgment</text>
    <!-- Approval -->
    <rect x="422" y="150" width="116" height="60" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <text x="480" y="186" text-anchor="middle" fill="#2a1a0e">Approval</text>
    <!-- Learning -->
    <rect x="552" y="150" width="116" height="60" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <text x="610" y="186" text-anchor="middle" fill="#2a1a0e">Learning</text>
  </g>

  <!-- forward arrows -->
  <line x1="148" y1="180" x2="160" y2="180" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="278" y1="180" x2="290" y2="180" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="408" y1="180" x2="420" y2="180" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="538" y1="180" x2="550" y2="180" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- feedback arrow Learning -> Execution -->
  <path d="M 610 210 C 610 300, 90 300, 90 216" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowred)"/>
  <text x="350" y="296" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">feedback into the next campaign</text>

  <!-- annotation bands -->
  <line x1="32" y1="124" x2="278" y2="124" stroke="#545454" stroke-width="1"/>
  <text x="155" y="116" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">AI can assist</text>
  <line x1="292" y1="124" x2="668" y2="124" stroke="#545454" stroke-width="1"/>
  <text x="480" y="116" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">human acts</text>

  <text x="350" y="356" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Time freed in Execution and Evidence must be reinvested downstream — not simply consumed by more execution.</text>
