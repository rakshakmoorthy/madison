  <desc>A six-stage workflow: Data Collection, AI Analysis, and Artifact Production are AI-assistable; an emphasized human Gate runs the four-list sort; then Warranted-Verb Rewrite and Recommendation. The Gate is the human-owned step where a named reviewer decides which list each candidate claim belongs in.</desc>
