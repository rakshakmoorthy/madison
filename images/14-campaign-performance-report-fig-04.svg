<title id="fig-title-04">Caveat Placement Guide</title>
<desc>Five report limitations connected to where each caveat belongs within a report column. Sample size sits below the metric result, confound in the interpretation section, source lag in data sources, attribution as a standing caveat in the executive summary, and baseline mismatch below the baseline comparison. Caveats belong adjacent to the claims they qualify.</desc>
