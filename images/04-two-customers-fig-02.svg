<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">Two Failure Modes</title>
  <desc>Two panels showing opposite ways a workflow fails. The quiet failure produces a tidy machine-readable artifact with populated fields and clean logs but a hollow human-interpretation area, so it sits unused. The loud failure produces a persuasive memo a human acts on but with a hollow reproducibility area — no inputs, parameters, or logs — so it cannot be rerun. Each panel shows one full half and one outlined-empty half.</desc>
