<title id="fig-title-01">The Issue-Routing Digest Structure</title>
<desc>One issue-routing digest row as nine adjacent cells: source URL, capture timestamp, issue class, sentiment label, severity, assigned owner, recommended action, response gate and optional holding language. The sentiment cell carries a model-judgment qualifier, the response-gate cell a heavier border, and the holding-language cell a dashed outline marking it optional.</desc>
