<title id="fig-title-02">The Recipe Input Chain</title>
<desc>A systems diagram of QA inputs. Brand rules and the voice guide feed review criteria, which the agent applies to touchpoints. An accessibility check runs in parallel and a claims/proof map feeds the evidentiary layer. All streams converge on the QA matrix, which closes at a human-decision gate. Missing inputs change the epistemic status of findings, not the process.</desc>
