<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">The Four-List Sort</title>
  <desc>Four equal buckets for sorting any claim by what the evidence warrants: Can Say, Can Suggest, Cannot Claim, and Needs Human Review. Equal sizing signals the goal is correct placement, not moving everything into Can Say.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="05-verifying-brand-evidence" figure-number="03" figure-title="The Four-List Sort" figure-slug="four-list-sort" figure-type="hierarchy/taxonomy" priority="Important" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/05-verifying-brand-evidence-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">The Four-List Sort</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Every claim lands in exactly one bucket. The aim is to know which — not to force everything left.</text>

  <!-- Can Say -->
  <rect x="40" y="84" width="300" height="148" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <rect x="40" y="84" width="300" height="30" fill="#C8102E"/>
  <text x="54" y="104" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">CAN SAY</text>
  <text x="54" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Evidence directly and fully supports it</text>
  <line x1="54" y1="152" x2="326" y2="152" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="54" y1="176" x2="326" y2="176" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="54" y1="200" x2="326" y2="200" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Can Suggest -->
  <rect x="360" y="84" width="300" height="148" fill="#FFFFFF" stroke="#787878" stroke-width="1"/>
  <rect x="360" y="84" width="300" height="30" fill="#787878"/>
  <text x="374" y="104" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">CAN SUGGEST</text>
  <text x="374" y="130" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Worth flagging, not strong enough to recommend</text>
  <line x1="374" y1="152" x2="646" y2="152" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="374" y1="176" x2="646" y2="176" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="374" y1="200" x2="646" y2="200" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Cannot Claim -->
  <rect x="40" y="244" width="300" height="148" fill="#FFFFFF" stroke="#ADADAD" stroke-width="1"/>
  <rect x="40" y="244" width="300" height="30" fill="#2a1a0e"/>
  <text x="54" y="264" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">CANNOT CLAIM</text>
  <text x="54" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Unsupported, however confident it sounds</text>
  <line x1="54" y1="312" x2="326" y2="312" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="54" y1="336" x2="326" y2="336" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="54" y1="360" x2="326" y2="360" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Needs Human Review -->
  <rect x="360" y="244" width="300" height="148" fill="#FFFFFF" stroke="#ADADAD" stroke-width="1"/>
  <rect x="360" y="244" width="300" height="30" fill="#C8860E"/>
  <text x="374" y="264" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">NEEDS HUMAN REVIEW</text>
  <text x="374" y="290" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Ambiguous; requires contextual judgment</text>
  <line x1="374" y1="312" x2="646" y2="312" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="374" y1="336" x2="646" y2="336" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="374" y1="360" x2="646" y2="360" stroke="#D4D4D4" stroke-width="1"/>
