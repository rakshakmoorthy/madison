<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The QA Matrix Structure</title>
<desc>One QA-matrix row shown as eight adjacent cells: touchpoint, rule reference, issue, evidence, severity, recommendation, owner and decision. The rule-reference cell carries a heavier border because an issue without a rule citation is an opinion. The severity cell holds a four-state indicator: critical, major, minor, note.</desc>
