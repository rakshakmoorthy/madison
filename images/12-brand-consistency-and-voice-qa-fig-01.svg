<text x="350" y="348" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Every finding travels from a cited rule through specific evidence</text>
<text x="350" y="366" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">to a severity rating and ends in a recorded human decision.</text>
<text x="350" y="392" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">An issue without a rule citation is an opinion, not a finding.</text>
