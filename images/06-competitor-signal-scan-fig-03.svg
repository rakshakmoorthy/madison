<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Observation Layer vs Implication Layer</title>
  <desc>Two stacked bands. The lower observation layer holds sourced, dated, directly observed signals where every entry traces to a source. A gate line separates it from the upper implication layer of labeled interpretations marked as candidate, not finding. A single arrow rises through the gate; the same observation can support several competing interpretations, so the crossing is a human decision.</desc>
