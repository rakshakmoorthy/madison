  <text x="54" y="124" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Labeled interpretations — candidate meaning, not finding</text>
  <g fill="#FFFFFF" stroke="#C8860E" stroke-width="1">
