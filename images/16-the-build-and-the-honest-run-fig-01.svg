<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The Honest Run Output Package</title>
<desc>Six artifacts of a complete honest-run output package arranged around a bounded-project core: run log, evidence appendix, report, gate decision record, portfolio note and reflection. The run log is the auditable spine; the evidence appendix feeds the report; the report is the one artifact that crosses the phase gate to an external audience; the reflection pairs with the log.</desc>
