<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">Evidence-Quality Quadrant Map</title>
  <desc>A two-axis map: coverage runs narrow to broad on the horizontal axis, recency runs old to recent on the vertical axis. The four quadrants rank evidence from strongest (broad and recent) to weakest (narrow and old), with method and sample noted as a third dimension that can weaken even strong evidence.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="05-verifying-brand-evidence" figure-number="02" figure-title="Evidence-Quality Quadrant Map" figure-slug="evidence-quality-quadrant-map" figure-type="conceptual map" priority="Important" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/05-verifying-brand-evidence-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Evidence-Quality Quadrant Map</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">How much coverage and how recent — the two axes that set how strong a claim the evidence can carry.</text>

  <!-- plot region -->
  <rect x="120" y="84" width="500" height="320" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- quadrant fills (light) -->
  <rect x="370" y="84" width="250" height="160" fill="#FFFFFF"/>
  <rect x="120" y="84" width="250" height="160" fill="#FFFFFF"/>
  <rect x="120" y="244" width="250" height="160" fill="#FFFFFF"/>
  <rect x="370" y="244" width="250" height="160" fill="#FFFFFF"/>

  <!-- axes -->
  <line x1="120" y1="404" x2="636" y2="404" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="120" y1="404" x2="120" y2="68" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- internal divider lines -->
  <line x1="370" y1="84" x2="370" y2="404" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="120" y1="244" x2="620" y2="244" stroke="#D4D4D4" stroke-width="1"/>

  <!-- axis labels -->
  <text x="378" y="424" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">COVERAGE  narrow → broad</text>
  <text x="105" y="80" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" transform="rotate(-90 105 80)" text-anchor="end">RECENCY  old → recent</text>

  <!-- top-right strongest -->
  <rect x="386" y="100" width="218" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="396" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Broad &amp; recent</text>
  <text x="396" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Supports the strongest claims</text>
  <text x="396" y="172" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-style="italic" fill="#787878">e.g. current category-wide tracking study</text>

  <!-- top-left historical -->
  <rect x="136" y="100" width="218" height="50" fill="#FFFFFF" stroke="#787878" stroke-width="1"/>
  <text x="146" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Broad &amp; old</text>
  <text x="146" y="138" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Historical context only</text>
  <text x="146" y="172" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-style="italic" fill="#787878">e.g. last year's brand survey</text>

  <!-- bottom-right local signal -->
  <rect x="386" y="260" width="218" height="50" fill="#FFFFFF" stroke="#787878" stroke-width="1"/>
  <text x="396" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Narrow &amp; recent</text>
  <text x="396" y="298" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A local signal</text>
  <text x="396" y="332" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-style="italic" fill="#787878">e.g. one recent focus group</text>

  <!-- bottom-left weakest -->
  <rect x="136" y="260" width="218" height="50" fill="#FFFFFF" stroke="#ADADAD" stroke-width="1"/>
  <text x="146" y="280" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Narrow &amp; old</text>
  <text x="146" y="298" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Weakest evidence</text>
  <text x="146" y="332" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" font-style="italic" fill="#787878">e.g. an old anecdote</text>

  <!-- third-dimension note -->
  <line x1="32" y1="440" x2="668" y2="440" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="32" y="460" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Third dimension: weak method or a small sample can pull even broad-and-recent evidence back down.</text>
</svg>
