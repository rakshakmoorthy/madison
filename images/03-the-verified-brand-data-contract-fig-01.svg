<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The Five Epistemic-Status Labels</title>
  <desc>Five equal, parallel boxes naming the labels in the verified brand data contract, ordered raw to finished: raw data, verified data, generated artifact, approval record, and report. Each carries a note on what may be cited from it. The generated artifact is flagged as not evidence by default. Colour marks epistemic status, not quality.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="03-the-verified-brand-data-contract" figure-number="01" figure-title="The Five Epistemic-Status Labels" figure-slug="the-five-epistemic-status-labels" figure-type="hierarchy/taxonomy" priority="Critical" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/03-the-verified-brand-data-contract-cajal.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <text x="32" y="44" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Five epistemic-status labels (status, not ranking)</text>

  <!-- Raw data -->
  <rect x="32" y="72" width="636" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="32" y="72" width="10" height="58" fill="#ADADAD"/>
  <text x="64" y="98" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="bold" fill="#2a1a0e">Raw data</text>
  <text x="64" y="118" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Source material as collected — cite only with its provenance attached.</text>

  <!-- Verified data -->
  <rect x="32" y="138" width="636" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="32" y="138" width="10" height="58" fill="#2a1a0e"/>
  <text x="64" y="164" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="bold" fill="#2a1a0e">Verified data</text>
  <text x="64" y="184" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Checked for date and method — citable as evidence.</text>

  <!-- Generated artifact -->
  <rect x="32" y="204" width="636" height="58" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <rect x="32" y="204" width="10" height="58" fill="#C8102E"/>
  <text x="64" y="230" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="bold" fill="#2a1a0e">Generated artifact</text>
  <text x="64" y="250" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E">Not evidence by default — a draft, not a source.</text>

  <!-- Approval record -->
  <rect x="32" y="270" width="636" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="32" y="270" width="10" height="58" fill="#2a1a0e"/>
  <text x="64" y="296" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="bold" fill="#2a1a0e">Approval record</text>
  <text x="64" y="316" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Who authorized what, when — citable proof of a decision.</text>

  <!-- Report -->
  <rect x="32" y="336" width="636" height="58" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="32" y="336" width="10" height="58" fill="#787878"/>
  <text x="64" y="362" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="bold" fill="#2a1a0e">Report</text>
  <text x="64" y="382" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">The terminal product — only as defensible as the labels beneath it.</text>
</svg>
