<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-04">
<title id="fig-title-04">The Response Gate</title>
<desc>A five-stage flow: signal detected, digest entry created, owner reviews, response authorized, response sent. A gate line between owner review and authorization marks the human-decision boundary. Above it are agent-capable actions: monitor, classify, summarize, draft candidates. Below it are human-required actions: severity confirmation, escalation path, response content, timing.</desc>
