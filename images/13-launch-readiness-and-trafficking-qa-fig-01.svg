<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The Six Launch Check Categories</title>
<desc>Six launch-check categories. Five parallel checks—asset completeness, URL integrity, claims and proof alignment, approvals and disclosures, and accessibility—converge into the sixth, blocker identification and severity classification. The claims-and-proof node carries a heavier border as the most consequential check, the one that cannot be corrected quietly after launch.</desc>
