<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
<title id="fig-title-01">The Three Layers of a Performance Report</title>
<desc>A vertical three-tier stack built from foundation to apex: description at the base, interpretation in the middle, recommendation at the top. Each tier names what it contains and who is accountable, shifting from machine-assisted at the base to human-owned at the top. A boundary line marks the accountability shift between interpretation and recommendation.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="14-campaign-performance-report" figure-number="01" figure-title="The Three Layers of a Performance Report" figure-slug="the-three-layers-of-a-performance-report" figure-type="hierarchy/taxonomy" priority="Critical" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/14-campaign-performance-report-cajal.md"/></metadata>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<text x="350" y="40" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The Three Layers of a Performance Report</text>

<!-- recommendation (top, dominant) -->
<rect x="120" y="74" width="460" height="80" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1"/>
<text x="140" y="100" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">Recommendation</text>
<text x="140" y="120" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">Action · next test · decision owner</text>
<text x="140" y="140" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">AI cannot supply — human accountable</text>

<!-- accountability boundary -->
<line x1="120" y1="158" x2="580" y2="158" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="590" y="162" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#C8102E" text-anchor="start">shift</text>

<!-- interpretation (middle, primary) -->
<rect x="120" y="166" width="460" height="80" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
<rect x="120" y="166" width="8" height="80" fill="#C8102E"/>
<text x="140" y="192" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Interpretation</text>
<text x="140" y="212" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Baseline comparisons · anomaly flags · signal vs. noise</text>
<text x="140" y="232" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">AI surfaces candidates — human decides meaning</text>

<!-- description (base, secondary) -->
<rect x="120" y="258" width="460" height="80" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.5"/>
<rect x="120" y="258" width="8" height="80" fill="#C8860E"/>
<text x="140" y="284" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Description</text>
<text x="140" y="304" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Metric values · source files · export dates</text>
<text x="140" y="324" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">AI extracts and formats — verified against KPI map</text>

<!-- upward build arrow -->
<line x1="86" y1="338" x2="86" y2="80" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="74" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 74 210)">facts → action</text>

<text x="350" y="372" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The report builds upward; accountability moves from machine-assisted to human-owned.</text>
</svg>
