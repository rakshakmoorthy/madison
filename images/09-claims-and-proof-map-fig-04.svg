  <title id="fig-title-04">Evidence Boundary</title>
  <desc>Three zones separate the inputs to a claims audit by who is accountable. The verified-evidence zone holds source documents, metrics, testimonials, screenshots, and approved boilerplate. The model-judgment zone holds claim classification and rewrite suggestions. A heavier divider marks the phase gate before the human-judgment zone, which holds risk tolerance, brand fit, and final copy approval. The model prepares; the human signs.</desc>
