  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e">Claim Type Taxonomy</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Seven kinds of claim, sorted by the proof each demands — not by which is better.</text>

  <!-- proof-burden axis label -->
  <text x="560" y="92" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">PROOF BURDEN</text>
  <line x1="610" y1="100" x2="610" y2="380" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="620" y="110" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">high</text>
  <text x="620" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">low</text>

  <!-- 7 nodes, uniform size, high to low -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">
    <rect x="40" y="100" width="300" height="36" fill="#FFFFFF" stroke="#787878" stroke-width="1"/><text x="56" y="123">Performance claim</text>
    <rect x="350" y="106" width="80" height="24" fill="#787878"/>
    <rect x="40" y="140" width="300" height="36" fill="#FFFFFF" stroke="#787878" stroke-width="1"/><text x="56" y="163">Comparative claim</text>
    <rect x="350" y="146" width="72" height="24" fill="#787878"/>
    <rect x="40" y="180" width="300" height="36" fill="#FFFFFF" stroke="#787878" stroke-width="1"/><text x="56" y="203">Factual claim</text>
    <rect x="350" y="186" width="60" height="24" fill="#787878"/>
    <rect x="40" y="220" width="300" height="36" fill="#FFFFFF" stroke="#787878" stroke-width="1"/><text x="56" y="243">Credential claim</text>
    <rect x="350" y="226" width="48" height="24" fill="#787878"/>
    <rect x="40" y="260" width="300" height="36" fill="#FFFFFF" stroke="#787878" stroke-width="1"/><text x="56" y="283">Audience claim</text>
    <rect x="350" y="266" width="40" height="24" fill="#787878"/>
