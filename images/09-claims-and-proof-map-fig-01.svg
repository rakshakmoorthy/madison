<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">Claim Type Taxonomy</title>
  <desc>Seven claim categories a copy auditor must distinguish, ordered by proof burden from highest to lowest: performance and comparative carry the heaviest burden, then factual, credential, and audience, then opinion (needs attribution), and puffery (asserts nothing, no proof) as the structural outlier. A small marker beside each shows its relative proof requirement.</desc>
