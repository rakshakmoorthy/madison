  <desc>Two equal columns joined by a shared spine, showing the two customers every recipe must serve at once. The executing agent needs explicit inputs, a clear transformation, an output schema, and graceful anomaly handling. The human maintainer needs the purpose, the decision it supports, the review point and its meaning, and the ability to modify the recipe. Their needs are partly in tension.</desc>
