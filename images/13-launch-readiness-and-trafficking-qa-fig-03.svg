<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
<title id="fig-title-03">The Go/No-Go Decision Gate</title>
<desc>A go/no-go flow that does not reduce to a checkbox count. A classified blocker list reaches a single named approver who asks whether the remaining risk is acceptable. Two paradox paths feed it: all-clear-but-not-ready, and minor-unresolved-but-ready. Outcomes are go (recorded), hold, and a blocking terminus for a misaligned claim or unidentified approver.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Madison Plus One" book-slug="madison" chapter="13-launch-readiness-and-trafficking-qa" figure-number="03" figure-title="The Go/No-Go Decision Gate" figure-slug="the-go-no-go-decision-gate" figure-type="process flowchart" priority="Important" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/13-launch-readiness-and-trafficking-qa-cajal.md"/></metadata>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>

<text x="350" y="40" text-anchor="middle" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The Go / No-Go Decision Gate</text>

<!-- input: classified blocker list -->
<rect x="32" y="160" width="120" height="60" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
<text x="92" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Classified</text>
<text x="92" y="200" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">blocker list</text>

<!-- paradox feed paths -->
<rect x="32" y="74" width="160" height="40" fill="#FFFFFF" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>
<text x="112" y="90" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">All clear, yet</text>
<text x="112" y="104" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">not ready (pressured)</text>
<line x1="192" y1="100" x2="330" y2="170" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<rect x="32" y="270" width="160" height="40" fill="#FFFFFF" stroke="#787878" stroke-width="1" stroke-dasharray="4 3"/>
<text x="112" y="286" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">Minor unresolved,</text>
<text x="112" y="300" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">yet may proceed</text>
<line x1="192" y1="290" x2="330" y2="210" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<line x1="152" y1="190" x2="328" y2="190" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- gate line + approver decision (diamond) -->
<line x1="340" y1="120" x2="340" y2="280" stroke="#C8102E" stroke-width="1.5"/>
<text x="340" y="112" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#C8102E">human accountability</text>
<polygon points="430,150 510,190 430,230 350,190" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1"/>
<text x="430" y="186" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#FFFFFF">Is remaining</text>
<text x="430" y="200" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#FFFFFF">risk acceptable?</text>

<!-- outcomes -->
<!-- go (active) -->
<line x1="510" y1="174" x2="556" y2="120" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="560" y="92" width="108" height="50" fill="#545454" stroke="#545454" stroke-width="1"/>
<text x="614" y="112" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">GO</text>
<text x="614" y="128" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#FFFFFF">name + time + status</text>

<!-- hold (transitional) -->
<line x1="510" y1="190" x2="556" y2="190" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="560" y="166" width="108" height="48" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.5"/>
<text x="614" y="195" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">HOLD</text>

<!-- critical blocker terminus (blocking) -->
<line x1="510" y1="206" x2="556" y2="262" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="560" y="240" width="108" height="62" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
<text x="614" y="262" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">Critical blocker</text>
<text x="614" y="278" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">misaligned claim /</text>
<text x="614" y="291" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">no named approver</text>

<text x="350" y="356" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The decision weighs acceptable risk, not whether every box is checked.</text>
<text x="350" y="378" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">Some critical blockers cannot be accepted at all.</text>
</svg>
