<title id="fig-title-01">The Five Themes Around the Central Claim</title>
<desc>A radial hub-and-spoke map. The central claim—AI makes brand execution cheaper but does not make brand judgment cheap—sits at the hub, with five themes around it: friction is the mechanism, phase gates make the boundary explicit, provenance beats polish, two customers, and humans plus AI not humans or AI. The human-judgment spoke is emphasized.</desc>
