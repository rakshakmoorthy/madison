<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">One number, three baselines</title>
  <desc id="desc">The same brand-consideration value shown as an identical bar in three panels; only the reference line changes, flipping the verdict from uninterpretable to positive movement to a shortfall.</desc>
  <style>
    .h{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;fill:#2a1a0e;}
    .p{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;fill:#2a1a0e;}
    .a{font-family:'JetBrains Mono',monospace;font-size:11px;fill:#545454;}
    .v{font-family:'JetBrains Mono',monospace;font-size:13px;fill:#FFFFFF;font-weight:700;}
    .g{font-family:'EB Garamond',Georgia,serif;font-size:14px;font-style:italic;fill:#545454;}
  </style>
  <rect width="700" height="420" fill="#FFFFFF"/>
  <text class="h" x="40" y="40">Brand consideration: one number, three baselines</text>

  <!-- common zero baseline at y=320; bar value 34% -> top at y=140 (height 180) -->
  <!-- panel geometry: bar same height all three. zero line y=320 -->
  <!-- Panel 1 -->
  <text class="p" x="40" y="70">No reference</text>
  <rect x="50" y="140" width="80" height="180" fill="#545454"/>
  <text class="v" x="90" y="240" text-anchor="middle" transform="rotate(-90 90 240)">34%</text>
  <line x1="40" y1="320" x2="170" y2="320" stroke="#2a1a0e" stroke-width="1.5"/>
  <text class="a" x="50" y="340">Uninterpretable</text>

  <!-- Panel 2 -->
  <text class="p" x="270" y="70">vs prior period</text>
  <rect x="280" y="140" width="80" height="180" fill="#545454"/>
  <text class="v" x="320" y="240" text-anchor="middle" transform="rotate(-90 320 240)">34%</text>
  <line x1="270" y1="320" x2="400" y2="320" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- prior baseline 29% lower -> y=293 -->
  <line x1="280" y1="293" x2="400" y2="293" stroke="#C8102E" stroke-width="2" stroke-dasharray="6 4"/>
  <text class="a" x="280" y="288" fill="#C8102E">prior 29%</text>
  <rect x="362" y="140" width="10" height="153" fill="#C8860E" opacity="0.5"/>
  <text class="a" x="270" y="340">Movement: +5 pts</text>

  <!-- Panel 3 -->
  <text class="p" x="500" y="70">vs benchmark</text>
  <rect x="510" y="140" width="80" height="180" fill="#545454"/>
  <text class="v" x="550" y="240" text-anchor="middle" transform="rotate(-90 550 240)">34%</text>
  <line x1="500" y1="320" x2="630" y2="320" stroke="#2a1a0e" stroke-width="1.5"/>
  <!-- benchmark 38% higher -> y=118 -->
  <line x1="510" y1="118" x2="630" y2="118" stroke="#C8102E" stroke-width="2" stroke-dasharray="6 4"/>
  <text class="a" x="510" y="112" fill="#C8102E">benchmark 38%</text>
  <rect x="592" y="118" width="10" height="22" fill="#C8860E" opacity="0.5"/>
  <text class="a" x="500" y="340">Gap: -4 pts</text>

  <text class="g" x="40" y="378">The number does not change. Its meaning depends entirely on the baseline</text>
  <text class="g" x="40" y="398">it is read against.</text>
</svg>
