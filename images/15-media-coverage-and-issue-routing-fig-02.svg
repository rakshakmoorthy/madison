<svg viewBox="0 0 700 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
<title id="fig-title-02">Issue Taxonomy Decision Tree</title>
<desc>A decision tree classifying an incoming monitoring signal into one of seven issue classes. Five cascading yes/no tests route the signal to factual error, product complaint, reputation risk, crisis signal or competitive mention; if all are no it falls through to neutral or positive coverage. Crisis signal and reputation risk are high-stakes; neutral/positive is the benign terminus.</desc>
